name: Test target-clickhouse

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  linting:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
    - name: Run lint command from tox.ini
      run: |
        uvx --with tox-uv tox -e lint

  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0
        id: baipp

  pytest:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build-package
    strategy:
      max-parallel: 1
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Start ClickHouse (and ssh_tunnel test infra)
      run: |
        ./gen_ssh_tunnel_test_key.sh
        docker compose --profile ssh-tunnel up -d --wait
    - name: Install dependencies
      run: |
        uv sync
    - name: Test with pytest
      run: |
        uv run pytest \
          --capture=no \
          --deselect=tests/test_core.py::TestTargetClickhouse::test_target_camelcase \
          --deselect=tests/test_core.py::TestTargetClickhouse::test_target_camelcase_complex_schema

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      clickhouse-server:
        image: clickhouse/clickhouse-server:26.6-alpine@sha256:8f9b2156a081a62878ec3c86bb4f175ebb7fafeb883efb0d1060e1d994ae0ec0
        ports:
          - 18123:8123
          - 19000:9000
        env:
          # 24.x+ locks the `default` user's password/network access down by
          # default unless CLICKHOUSE_USER/CLICKHOUSE_PASSWORD are set. This
          # skips that setup, keeping the classic no-password `default` user
          # the test suite connects as.
          CLICKHOUSE_SKIP_USER_SETUP: 1
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
    - name: smoke-test-tap
      run: uvx meltano run tap-smoke-test target-clickhouse
