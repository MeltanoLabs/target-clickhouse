services:
  clickhouse-server:
    image: clickhouse/clickhouse-server:26.6-alpine
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      # 24.x+ locks the `default` user's password/network access down by
      # default unless CLICKHOUSE_USER/CLICKHOUSE_PASSWORD are set. This skips
      # that setup, keeping the classic no-password `default` user tests rely on.
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  # tests/test_ssh_tunnel.py needs a ClickHouse instance that is *only*
  # reachable through a bastion (not from the test host directly), so that a
  # test could not "pass" even if tunneling silently did nothing. Not part of
  # the default `docker compose up` -- opt in with:
  #   ./gen_ssh_tunnel_test_key.sh
  #   docker compose --profile ssh-tunnel up -d
  clickhouse-tunnel-target:
    image: clickhouse/clickhouse-server:26.6-alpine
    profiles: ["ssh-tunnel"]
    networks:
      - ssh_tunnel_isolated
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    # Deliberately no `ports:` -- this network is the whole point of the test.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  ssh-tunnel-bastion:
    image: lscr.io/linuxserver/openssh-server:latest
    profiles: ["ssh-tunnel"]
    ports:
      - "2222:2222"
    networks:
      - ssh_tunnel_isolated
    environment:
      PUBLIC_KEY_FILE: /keys/id_ed25519.pub
      USER_NAME: testuser
      PASSWORD_ACCESS: "false"
      SUDO_ACCESS: "false"
    volumes:
      - ./.ssh_tunnel_test_keys/id_ed25519.pub:/keys/id_ed25519.pub:ro
      - ./tests/fixtures/ssh_tunnel/custom-cont-init.d:/custom-cont-init.d:ro
    depends_on:
      clickhouse-tunnel-target:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "2222"]
      interval: 2s
      timeout: 2s
      retries: 30

networks:
  # A dedicated network (not the default project network) so
  # clickhouse-tunnel-target is genuinely unreachable except through the bastion.
  ssh_tunnel_isolated: {}
